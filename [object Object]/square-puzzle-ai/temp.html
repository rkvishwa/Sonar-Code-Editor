<script>
    const gameGrid = 4;
    const completedPositions = [];
    let prohibitedPos;
    const boxes = document.querySelectorAll("body > div > div");
    const editMode = document.querySelectorAll("input[type='checkbox']")[0];
    const aiMode = document.querySelectorAll("input[type='checkbox']")[1];
    let editSelectedPos;

    boxes.forEach((box, key) => {
        box.addEventListener('click', () => handleBoxClick(key + 1))
    })

    function handleBoxClick(pos){
        if(editMode.checked){
            handleEditMode(pos);
            return;
        }

        const emptyPos = valuePos();
        const [clickX, clickY] = getCoordinate(pos)
        const [emptyX, emptyY] = getCoordinate(emptyPos)
        const xGap = clickX - emptyX;
        const yGap = clickY - emptyY;

        if(xGap > 1 || xGap < -1){
            return;
        }

        if(yGap > 1 || yGap < -1){
            return;
        }

        if(clickX != emptyX && clickY != emptyY){
            return;
        }

        boxes[emptyPos - 1].textContent = boxes[pos - 1].textContent;
        boxes[pos - 1].textContent = '';

        setTimeout(validateBoxes , 100)
    }

    function handleEditMode(pos){
        if(editSelectedPos){
            const textTemp = boxes[pos -1].textContent
            boxes[pos -1].textContent = boxes[editSelectedPos -1].textContent
            boxes[editSelectedPos -1].textContent = textTemp;
            boxes[editSelectedPos -1].style.background = ''
            editSelectedPos = null;
        }else{
            boxes[pos -1].style.background = 'red'
            editSelectedPos = pos;
        }
    }

    function valuePos(value = ''){
        for (i = 0; i < 16; i++){
            if(boxes[i].textContent.trim() == value){
                return i + 1;
            }
        }
    }

    function getCoordinate(pos){
        const col = pos % 4 != 0 ? pos % 4 : 4;
        const row = pos % 4 != 0 ? (parseInt(pos / 4) + 1) : parseInt(pos / 4);

        return [row, col];
    }

    function validateBoxes(){
        for (i = 0; i < 15; i++){
            if(boxes[i].textContent.trim() != i + 1){
                return;
            }
        }

        alert("You have solved!! Well done...");
    }

    editMode.addEventListener('change', (e) => {
        if(!e.target.checked){
            editSelectedPos = null;
            boxes.forEach(box => {
                box.style.background = '';
            })
        }
    })

    aiMode.addEventListener('change', (e) => {
        if(e.target.checked){
            startAIMode()
        }
    })

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getPosition(x,y){
        if(x > 4 || x < 1 || y > 4 || y < 1){
            return null;
        }

        if(y != 4){
            return (x - 1) * 4 + y;
        }else{
            return x * y;
        }
    }

    async function switchPos(pos1, pos2){
        const temp = boxes[pos1 - 1].textContent;
        boxes[pos1 - 1].textContent = boxes[pos2 - 1].textContent
        boxes[pos2 - 1].textContent = temp

        await sleep(300)
    }

<script>
    const allowed = [1, 2, 5, 6];
    async function startAIMode(){
        for(let i = 1; i < 16; i++){
            if(!allowed.includes(i)){
                continue;
            }

            let pos = valuePos(i);
            let stopGame = false;
            while(pos != i){
                prohibitedPos = pos;
                const valueData = findSpace(pos, i);
                if(!valueData){
                    break;
                }
                let emptyPos = valuePos();
                if(valueData[3].includes(emptyPos) && valueData[3].includes(valueData[2])){
                    valueData[2] = emptyPos;
                }
                
                while(emptyPos != valueData[2]){
                    const emptyData = findSpace(emptyPos, valueData[2])
                    if(!emptyData){
                        stopGame = true;
                        break;
                    }
                    const rotateEmptyParam = getEmptySpaceRotateParam(emptyData[0], emptyData[1], emptyData[3]);
                    if(rotateEmptyParam){
                        await rotateSpace(...rotateEmptyParam);
                        emptyPos = valuePos();
                    }else{
                        stopGame = true;
                        break;
                    }

                    if(valueData[3].includes(emptyPos) && valueData[3].includes(valueData[2])){
                        valueData[2] = emptyPos;
                    }
                }
                
                if(stopGame) break;

                const rotateValueParam = getSpaceRotateParam(...valueData);
                if(rotateValueParam){
                    await rotateSpace(...rotateValueParam)
                    pos = valuePos(i);
                }else{
                    break;
                }
            }
            completedPositions.push(i);
        }
    }

    async function rotateSpace(side, dir, len){
        let targetX, targetY;
        while(len > 0){
            const emptyPos = valuePos();
            const [emptyX, emptyY] = getCoordinate(emptyPos);
            switch (side) {
                case 'top': 
                    targetX = emptyX - 1;
                    targetY = emptyY;
                    if(dir == 'clock'){
                        side = 'right';
                    }else{
                        side = 'left';
                    }
                    break;
                case 'right': 
                    targetX = emptyX;
                    targetY = emptyY + 1;
                    if(dir == 'clock'){
                        side = 'bottom';
                    }else{
                        side = 'top';
                    }
                    break;
                case 'left': 
                    targetX = emptyX;
                    targetY = emptyY - 1;
                    if(dir == 'clock'){
                        side = 'top';
                    }else{
                        side = 'bottom';
                    }
                    break;
                case 'bottom': 
                    targetX = emptyX + 1;
                    targetY = emptyY;
                    if(dir == 'clock'){
                        side = 'left';
                    }else{
                        side = 'right';
                    }
                    break;
            }

            len--;
            await switchPos(emptyPos, getPosition(targetX, targetY));
        }
    }

    function findSpace(currentPos, targetPos){
        const [currentX, currentY] = getCoordinate(currentPos);
        const [targetX, targetY] = getCoordinate(targetPos);
        const [emptyX, emptyY] = getCoordinate(valuePos());
        const xGap = targetX - currentX;
        const yGap = targetY - currentY;
        const spaceOrder = [];
        const spaceScore = [];
        const spaces = ['bottom-right', 'bottom-left', 'top-right', 'top-left'];

        if(xGap > 0){
            if(yGap > 0){
                spaceOrder[0] = 'bottom-right';
            }else if(yGap < 0){
                spaceOrder[0] = 'bottom-left';
            }else{
                spaceOrder[0] = 'bottom-right';
                spaceOrder[1] = 'bottom-left';
            }
        }else if(xGap < 0){
            if(yGap > 0){
                spaceOrder[0] = 'top-right';
            }else if(yGap < 0){
                spaceOrder[0] = 'top-left';
            }else{
                spaceOrder[0] = 'top-right';
                spaceOrder[1] = 'top-left';
            }
        }else{
            if(yGap > 0){
                spaceOrder[0] = 'bottom-right';
                spaceOrder[1] = 'top-right';
            }else if(yGap < 0){
                spaceOrder[0] = 'bottom-left';
                spaceOrder[1] = 'top-left';
            }
        }

        spaces.forEach(space => {
            if(!spaceOrder.includes(space)){
                spaceOrder.push(space)
            }
        })

        spaceOrder.forEach(space => {
            spaceScore.push(getSpaceScore(currentX, currentY, space));
        })

        let maxScore = 0;
        let maxScoreIndex;

        spaceScore.forEach((score, i) => {
            if(score > maxScore){
                maxScore = score;
                maxScoreIndex = i;
            }
        })

        if(maxScore < 1){
            console.log('No space available', currentPos, targetPos, maxScore, spaces, spaceOrder, spaceScore)
            return false;
        }

        const optimalSpace = spaceOrder[maxScoreIndex];
        const spacePositions = [];
        let optimalDistance, optimalPosition, optimalDistanceEmpty, optimalPositionEmpty;

        switch (optimalSpace){
            case 'bottom-right':
                spacePositions.push(getPosition(currentX + 1, currentY));
                spacePositions.push(getPosition(currentX, currentY + 1));
                spacePositions.push(getPosition(currentX + 1, currentY + 1));
                break;
            case 'bottom-left':
                spacePositions.push(getPosition(currentX + 1, currentY));
                spacePositions.push(getPosition(currentX, currentY - 1));
                spacePositions.push(getPosition(currentX + 1, currentY - 1));
                break;
            case 'top-right':
                spacePositions.push(getPosition(currentX - 1, currentY));
                spacePositions.push(getPosition(currentX, currentY + 1));
                spacePositions.push(getPosition(currentX - 1, currentY + 1));
                break;
            case 'top-left':
                spacePositions.push(getPosition(currentX - 1, currentY));
                spacePositions.push(getPosition(currentX, currentY - 1));
                spacePositions.push(getPosition(currentX - 1, currentY - 1));
                break;
        }

        

        spacePositions.forEach(pos => {
            if(pos){
                const [xPos, yPos] = getCoordinate(pos);
                const distance = Math.sqrt((targetX - xPos) ** 2 + (targetY - yPos) ** 2);
                if((!optimalDistance && optimalDistance !== 0) ||  distance < optimalDistance){
                    optimalDistance = distance;
                    optimalPosition = pos;
                }

                const emptyDistance = Math.sqrt((emptyX - xPos) ** 2 + (emptyY - yPos) ** 2);
                if(!optimalDistanceEmpty ||  emptyDistance < optimalDistanceEmpty){
                    optimalDistanceEmpty = emptyDistance;
                    optimalPositionEmpty = pos;
                }
            }
        })

        return [optimalSpace, optimalPosition, optimalPositionEmpty, spacePositions];

    }

                spacePositions.push(getPosition(xPos, yPos - 1));

                        }else if(i == 1){
                            levelTwoPositions.push(getPosition(xPos, yPos + 2))

                        }else if(i == 2){

                            levelTwoPositions.push(getPosition(xPos + 1, yPos + 2))
                        }
                        break;
                    case 'bottom-left':
                        spacePositions.push(getPosition(xPos + 1, yPos));
                        spacePositions.push(getPosition(xPos, yPos - 1));
                        spacePositions.push(getPosition(xPos + 1, yPos - 1));
                        if(i == 0){
                            levelTwoPositions.push(getPosition(xPos + 2, yPos))

                        }else if(i == 1){
                            levelTwoPositions.push(getPosition(xPos, yPos - 2))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos - 1))
                        }else if(i == 2){
                            levelTwoPositions.push(getPosition(xPos + 2, yPos - 1))
                            levelTwoPositions.push(getPosition(xPos + 1, yPos - 2))
                        }
                        break;
                    case 'top-right':
                        spacePositions.push(getPosition(xPos - 1, yPos));
                        spacePositions.push(getPosition(xPos, yPos + 1));
                        spacePositions.push(getPosition(xPos - 1, yPos + 1));
                        if(i == 0){
                            levelTwoPositions.push(getPosition(xPos - 2, yPos))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos - 1))
                        }else if(i == 1){
                            levelTwoPositions.push(getPosition(xPos, yPos + 2))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos + 1))
                        }else if(i == 2){
                            levelTwoPositions.push(getPosition(xPos - 2, yPos + 1))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos + 2))
                        }
                        break;
                    case 'top-left':
                        spacePositions.push(getPosition(xPos - 1, yPos));
                        spacePositions.push(getPosition(xPos, yPos - 1));
                        spacePositions.push(getPosition(xPos - 1, yPos - 1));
                        if(i == 0){
                            levelTwoPositions.push(getPosition(xPos - 2, yPos))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos + 1))
                        }else if(i == 1){
                            levelTwoPositions.push(getPosition(xPos, yPos - 2))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos - 1))
                        }else if(i == 2){
                            levelTwoPositions.push(getPosition(xPos - 2, yPos - 1))
                            levelTwoPositions.push(getPosition(xPos - 1, yPos - 2))
                        }
                        break;
                }
            }
        })

        levelTwoPositions.forEach(pos => {
            if(pos == prohibitedPos || completedPositions.includes(pos)){
                score = -1;
            }else if(pos){
                score += 2;
            }
        })

        return score;
    }

                    if(target == spacePositions[0]){
                        side = 'bottom';
                        dir = 'clock';
                        len = 1;
                    }else if(target == spacePositions[1]){
                        side = 'left';
                        dir = 'anticlock';
                        len = 3;
                    }else if(target == spacePositions[2]){
                        if(spacePositions[0]){
                            side = 'bottom';
                            dir = 'clock';
                            len = 4;
                        }else if(spacePositions[1]){
                            side = 'left';
                            dir = 'anticlock';
                            len = 6;
                        }else{
                            console.log('No Move Available', space, target, empty, spacePositions);
                        }
                    }
                }else if(empty == spacePositions[1]){
                    if(target == spacePositions[0]){
                        side = 'top';
                        dir = 'clock';
                        len = 3;
                    }else if(target == spacePositions[1]){
                        side = 'right';
                        dir = 'anticlock';
                        len = 1;
                    }else if(target == spacePositions[2]){
                        if(spacePositions[1]){
                            side = 'right';
                            dir = 'anticlock';
                            len = 4;
                        }else if(spacePositions[0]){
                            side = 'top';
                            dir = 'clock';
                            len = 6;
                        }else{
                            console.log('No Move Available', space, target, empty, spacePositions);
                        }
                    }
                }else if(empty == spacePositions[2]){
                    if(target == spacePositions[0]){
                        side = 'right';
                        dir = 'clock';
                        len = 2;
                    }else if(target == spacePositions[1]){
                        side = 'bottom';
                        dir = 'anticlock';
                        len = 2;
                    }else if(target == spacePositions[2]){
                        if(spacePositions[0]){
                            side = 'bottom';
                            dir = 'anticlock';
                            len = 5;
                        }else if(spacePositions[1]){
                            side = 'right';
                            dir = 'clock';
                            len = 5;
                        }else{
                            console.log('No Move Available', space, target, empty, spacePositions);
                        }
                    }
                }
                break;
        }

        return [side, dir, len];
    }
