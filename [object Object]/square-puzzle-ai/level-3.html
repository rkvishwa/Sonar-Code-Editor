<script>
    const gameGrid = 4;
    let completedPositions = [];
    let prohibitedPos;
    const boxes = document.querySelectorAll("body > div > div");
    const editMode = document.querySelectorAll("input[type='checkbox']")[0];
    const aiMode = document.querySelectorAll("input[type='checkbox']")[1];
    let editSelectedPos;

    boxes.forEach((box, key) => {
        box.addEventListener('click', () => handleBoxClick(key + 1))
    })

    function handleBoxClick(pos){
        if(editMode.checked){
            handleEditMode(pos);
            return;
        }

        const emptyPos = valuePos();
        const [clickX, clickY] = getCoordinate(pos)
        const [emptyX, emptyY] = getCoordinate(emptyPos)
        const xGap = clickX - emptyX;
        const yGap = clickY - emptyY;

        if(xGap > 1 || xGap < -1){
            return;
        }

        if(yGap > 1 || yGap < -1){
            return;
        }

        if(clickX != emptyX && clickY != emptyY){
            return;
        }

        boxes[emptyPos - 1].textContent = boxes[pos - 1].textContent;
        boxes[pos - 1].textContent = '';

        setTimeout(validateBoxes , 100)
    }

    function handleEditMode(pos){
        if(editSelectedPos){
            const textTemp = boxes[pos -1].textContent
            boxes[pos -1].textContent = boxes[editSelectedPos -1].textContent
            boxes[editSelectedPos -1].textContent = textTemp;
            boxes[editSelectedPos -1].style.background = ''
            editSelectedPos = null;
        }else{
            boxes[pos -1].style.background = 'red'
            editSelectedPos = pos;
        }
    }

    function valuePos(value = ''){
        for (i = 0; i < 16; i++){
            if(boxes[i].textContent.trim() == value){
                return i + 1;
            }
        }
    }

    function getPosition(x,y){
        if(x > 4 || x < 1 || y > 4 || y < 1){
            return null;
        }

        if(y != 4){
            return (x - 1) * 4 + y;
        }else{
            return x * y;
        }
    }

    function getCoordinate(pos){
        const col = pos % 4 != 0 ? pos % 4 : 4;
        const row = pos % 4 != 0 ? (parseInt(pos / 4) + 1) : parseInt(pos / 4);

        return [row, col];
    }

    function validateBoxes(){
        for (i = 0; i < 15; i++){
            if(boxes[i].textContent.trim() != i + 1){
                return;
            }
        }

        alert("You have solved!! Well done...");
    }

    editMode.addEventListener('change', (e) => {
        if(!e.target.checked){
            editSelectedPos = null;
            boxes.forEach(box => {
                box.style.background = '';
            })
        }
    })

    aiMode.addEventListener('change', (e) => {
        if(e.target.checked){
            startAIMode()
        }
    })

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

<script>
    async function switchPos(pos1, pos2){
        const temp = boxes[pos1 - 1].textContent;
        boxes[pos1 - 1].textContent = boxes[pos2 - 1].textContent

        await sleep(300)
    }

    async function rotateSpace(side, dir, len){
        let targetX, targetY;
        while(len > 0){
            const emptyPos = valuePos();
            const [emptyX, emptyY] = getCoordinate(emptyPos);
            switch (side) {
                case 'top': 
                    targetX = emptyX - 1;
                    targetY = emptyY;
                    if(dir == 'clock'){
                        side = 'right';
                    }else{
                        side = 'left';
                    }
                    break;
                case 'right': 
                    targetX = emptyX;
                    targetY = emptyY + 1;
                    if(dir == 'clock'){
                        side = 'bottom';
                    }else{
                        side = 'top';
                    }
                    break;
                case 'left': 
                    targetX = emptyX;
                    targetY = emptyY - 1;
                    if(dir == 'clock'){
                        side = 'top';
                    }else{
                        side = 'bottom';
                    }
                    break;
                case 'bottom': 
                    targetX = emptyX + 1;
                    targetY = emptyY;
                    if(dir == 'clock'){
                        side = 'left';
                    }else{
                        side = 'right';
                    }
                    break;
            }

            len--;
            await switchPos(emptyPos, getPosition(targetX, targetY));
        }
    }

    function findSpace(currentPos, targetPos, nextPos = false){
        const [currentX, currentY] = getCoordinate(currentPos);
        const [targetX, targetY] = getCoordinate(targetPos);
        const [emptyX, emptyY] = getCoordinate(valuePos());
        const xGap = targetX - currentX;
        const yGap = targetY - currentY;
        const spaceScore = [];
        const spaceOrder = ['bottom-right', 'bottom-left', 'top-right', 'top-left'];

        spaceOrder.forEach(space => {
            spaceScore.push(getSpaceScore(currentX, currentY, space, targetPos, nextPos));
        })

        let maxScore = 0;
        let maxScoreIndex;

        spaceScore.forEach((score, i) => {
            if(score > maxScore){
                maxScore = score;
                maxScoreIndex = i;
            }
        })

        const maxScoreIndexArray = [maxScoreIndex];
        const maxScoreSpaces = [spaceOrder[maxScoreIndex]];

        spaceScore.forEach((score, i) => {
            if(score == maxScore && i != maxScoreIndex){
                maxScoreIndexArray.push(i)
                maxScoreSpaces.push(spaceOrder[i])
            }
        })

        if(maxScore < 1){
            console.log('No space available', currentPos, targetPos, maxScore, spaceOrder, spaceScore)
            return false;
        }

        let optimalSpace;
        if(maxScoreIndexArray.length > 1){
            optimalSpace = handleMultiSpace(currentX, currentY, maxScoreSpaces, targetPos);
        }else{
            optimalSpace = spaceOrder[maxScoreIndex];
        }

        const spacePositions = [];
        let optimalDistance, optimalPosition, optimalDistanceEmpty, optimalPositionEmpty;

        switch (optimalSpace){
            case 'bottom-right':
                spacePositions.push(getPosition(currentX + 1, currentY));
                spacePositions.push(getPosition(currentX, currentY + 1));
                spacePositions.push(getPosition(currentX + 1, currentY + 1));
                break;
            case 'bottom-left':
                spacePositions.push(getPosition(currentX + 1, currentY));
                spacePositions.push(getPosition(currentX, currentY - 1));
                spacePositions.push(getPosition(currentX + 1, currentY - 1));
                break;
            case 'top-right':
                spacePositions.push(getPosition(currentX - 1, currentY));
                spacePositions.push(getPosition(currentX, currentY + 1));
                spacePositions.push(getPosition(currentX - 1, currentY + 1));
                break;
            case 'top-left':
                spacePositions.push(getPosition(currentX - 1, currentY));
                spacePositions.push(getPosition(currentX, currentY - 1));
                spacePositions.push(getPosition(currentX - 1, currentY - 1));
                break;
        }

        

        spacePositions.forEach(pos => {
            if(pos){
                const [xPos, yPos] = getCoordinate(pos);
                const distance = Math.sqrt((targetX - xPos) ** 2 + (targetY - yPos) ** 2);
                if((!optimalDistance && optimalDistance !== 0) ||  distance < optimalDistance){
                    optimalDistance = distance;
                    optimalPosition = pos;
                }

                const emptyDistance = Math.sqrt((emptyX - xPos) ** 2 + (emptyY - yPos) ** 2);
                if(!optimalDistanceEmpty ||  emptyDistance < optimalDistanceEmpty){
                    optimalDistanceEmpty = emptyDistance;
                    optimalPositionEmpty = pos;
                }
            }
        })

        return [optimalSpace, optimalPosition, optimalPositionEmpty, spacePositions];

    }

    function handleMultiSpace(xPos, yPos, spaces, targetPos){
        const scores = [];
        spaces.forEach((space, i) => {
            scores[i] = 0;
            switch (space){
                case 'bottom-right':
                    scores[i] += getSpaceScore(xPos + 1, yPos, 'bottom-right', targetPos);
                    scores[i] += getSpaceScore(xPos + 1, yPos, 'bottom-left', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos + 1, 'bottom-right', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos + 1, 'top-right', targetPos);
                    break;
                case 'bottom-left':
                    scores[i] += getSpaceScore(xPos + 1, yPos, 'bottom-right', targetPos);
                    scores[i] += getSpaceScore(xPos + 1, yPos, 'bottom-left', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos - 1, 'bottom-left', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos - 1, 'top-left', targetPos);
                    break;
                case 'top-right':
                    scores[i] += getSpaceScore(xPos - 1, yPos, 'top-right', targetPos);
                    scores[i] += getSpaceScore(xPos - 1, yPos, 'top-left', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos + 1, 'bottom-right', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos + 1, 'top-right', targetPos);
                    break;
                case 'top-left':
                    scores[i] += getSpaceScore(xPos - 1, yPos, 'top-right', targetPos);
                    scores[i] += getSpaceScore(xPos - 1, yPos, 'top-left', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos - 1, 'bottom-left', targetPos);
                    scores[i] += getSpaceScore(xPos, yPos - 1, 'top-left', targetPos);
                    break;
            }
        })

        let maxScore = scores[0];
        let maxScoreIndex = 0;

        scores.forEach((score, i) => {
            if(score > maxScore){
                maxScore = score;
                maxScoreIndex = i;
            }
        })

        return spaces[maxScoreIndex];
    }

    function getSpaceScore(xPos, yPos, space, targetPos, nextPos){
        const spacePositions = [];
        let score = 0;
        switch (space){
            case 'bottom-right':
                spacePositions.push(getPosition(xPos + 1, yPos));
                spacePositions.push(getPosition(xPos, yPos + 1));
                spacePositions.push(getPosition(xPos + 1, yPos + 1));
                break;
            case 'bottom-left':
                spacePositions.push(getPosition(xPos + 1, yPos));
                spacePositions.push(getPosition(xPos, yPos - 1));
                spacePositions.push(getPosition(xPos + 1, yPos - 1));
                break;
            case 'top-right':
                spacePositions.push(getPosition(xPos - 1, yPos));
                spacePositions.push(getPosition(xPos, yPos + 1));
                spacePositions.push(getPosition(xPos - 1, yPos + 1));
                break;
            case 'top-left':
                spacePositions.push(getPosition(xPos - 1, yPos));
                spacePositions.push(getPosition(xPos, yPos - 1));
                spacePositions.push(getPosition(xPos - 1, yPos - 1));
                break;
        }

        let noNull = true;
        let emptyExist = false;
        let isNextPos = false;

        const emptyPos = valuePos();
        
        spacePositions.forEach((pos, i) => {
             if(pos == prohibitedPos || completedPositions.includes(pos)){
                score -= 16;
            }else if(pos == targetPos){
                score += 10;
            }else if(pos){
                if(i < 2){
                    score += 2;
                }else{
                    score += 1;
                }
            }
            
            if(pos == emptyPos){
                emptyExist = true;
            }

            if(nextPos && pos == nextPos){
                isNextPos = true;
            }

            if(completedPositions.includes(pos)){
                noNull = false;
            }
        })

        if(noNull && isNextPos && emptyExist){
            score += 100;
        }

        return score;
    }

<script>
    function getModules(n){
        const modules = [[],[],[],[]];
        const midPoint = n/2;
        for(let i = 0; i < midPoint; i++){
            for(let j = 0; j < midPoint; j++){
                modules[0].push(i*4 + j+1);
                modules[1].push(i*4 + j+3);
                modules[2].push((i+2)*4 + j+1);
                modules[3].push((i+2)*4 + j+3);
            }
        }

        return modules;
    }

    async function startAIMode(){
        completedPositions = [];
        const modules = getModules(4);
        modules.forEach(async (module, index) => {
            if(index == 0){
                await moduleOne(module);
            }
        })
    }

    async function moduleOne(module){
        const length = module.length
        for(let k = 0; k < length; k++){
            const i = module[k];
            let pos = valuePos(i);
            let stopGame = false;
            while(pos != i){
                prohibitedPos = pos;
                let valueData = findSpace(pos, i);
                if(!valueData){
                    break;
                }
                let emptyPos = valuePos();
                if(valueData[3].includes(emptyPos) && valueData[3].includes(valueData[2])){
                    valueData[2] = emptyPos;
                }
                
                while(emptyPos != valueData[2]){
                    const emptyData = findSpace(emptyPos, valueData[2])
                    if(!emptyData){
                        stopGame = true;
                        break;
                    }
                    const rotateEmptyParam = getEmptySpaceRotateParam(emptyData[0], emptyData[1], emptyData[3]);
                    if(rotateEmptyParam){
                        await rotateSpace(...rotateEmptyParam);
                        emptyPos = valuePos();
                    }else{
                        stopGame = true;
                        break;
                    }

                    valueData = findSpace(pos, i, valueData[2]);

                    if(valueData[3].includes(emptyPos) && valueData[3].includes(valueData[2])){
                        valueData[2] = emptyPos;
                    }
                }
                
                if(stopGame) break;

                const rotateValueParam = getSpaceRotateParam(...valueData);
                if(rotateValueParam){
                    await rotateSpace(...rotateValueParam)
                    pos = valuePos(i);
                }else{
                    break;
                }
            }
            completedPositions.push(i);
        }
    }
