<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Puzzle</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>fgffgfgfgfgfgfgffgfgf
    <div class="py-4 flex justify-end px-4 gap-2">
        <label class="border border-black py-1.5 px-2 rounded cursor-pointer duration-200 has-checked:bg-black has-checked:text-white">
            <input type="checkbox" class="hidden">
            <span>Edit Mode</span>
        </label>
        <label class="border border-yellow-600 py-1.5 px-2 rounded cursor-pointer duration-200 has-checked:bg-yellow-600 has-checked:text-white text-yellow-600">
            <input type="checkbox" class="hidden">
            <span>AI Mode</span>
        </label>
</div>
    <div class="w-xl grid grid-cols-4 grid-rows-4 p-16 mx-auto py-16 *:aspect-square *:grid *:place-content-center text-2xl font-semibold *:border-blue-600 *:bg-blue-600 *:empty:bg-white *:empty:border-2 *:rounded-lg gap-2 *:cursor-pointer *:select-none text-white">
        <div>10</div>
        <div>5</div>
        <div>6</div>
        <div>4</div>
        <div>9</div>
        <div>12</div>
        <div>14</div>
        <div>1</div>
        <div>2</div>
        <div>7</div>
        <div>3</div>
        <div>8</div>
        <div>13</div>
        <div></div>
        <div>11</div>
        <div>15</div>
    </div>
</body>

<script>
    const boxes = document.querySelectorAll("body > div > div");
    const editMode = document.querySelectorAll("input[type='checkbox']")[0];
    const aiMode = document.querySelectorAll("input[type='checkbox']")[1];
    let editSelectedPos;

    boxes.forEach((box, key) => {
        box.addEventListener('click', () => handleBoxClick(key + 1))
    })

    function handleBoxClick(pos){
        if(editMode.checked){
            handleEditMode(pos);
            return;
        }

        const emptyPos = valuePos();
        const [clickX, clickY] = getCoordinate(pos)
        const [emptyX, emptyY] = getCoordinate(emptyPos)
        const xGap = clickX - emptyX;
        const yGap = clickY - emptyY;

        if(xGap > 1 || xGap < -1){
            return;
        }

        if(yGap > 1 || yGap < -1){
            return;
        }

        if(clickX != emptyX && clickY != emptyY){
            return;
        }

        boxes[emptyPos - 1].textContent = boxes[pos - 1].textContent;
        boxes[pos - 1].textContent = '';

        setTimeout(validateBoxes , 100)
    }

    function handleEditMode(pos){
        if(editSelectedPos){
            const textTemp = boxes[pos -1].textContent
            boxes[pos -1].textContent = boxes[editSelectedPos -1].textContent
            boxes[editSelectedPos -1].textContent = textTemp;
            boxes[editSelectedPos -1].style.background = ''
            editSelectedPos = null;
        }else{
            boxes[pos -1].style.background = 'red'
            editSelectedPos = pos;
        }
    }

    function valuePos(value = ''){
        for (i = 0; i < 16; i++){
            if(boxes[i].textContent.trim() == value){
                return i + 1;
            }
        }
    }

    function getCoordinate(pos){
        const col = pos % 4 != 0 ? pos % 4 : 4;
        const row = pos % 4 != 0 ? (parseInt(pos / 4) + 1) : parseInt(pos / 4);

        return [row, col];
    }

    function validateBoxes(){
        for (i = 0; i < 15; i++){
            if(boxes[i].textContent.trim() != i + 1){
                return;
            }
        }

        alert("You have solved!! Well done...");
    }

    editMode.addEventListener('change', (e) => {
        if(!e.target.checked){
            editSelectedPos = null;
            boxes.forEach(box => {
                box.style.background = '';
            })
        }
    })
</script>
<script>
    aiMode.addEventListener('change', (e) => {
        if(e.target.checked){
            startAIMode()
        }
    })

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getPosition(x,y){
        if(y != 4){
            return (x - 1) * 4 + y;
        }else{
            return x * y;
        }
    }

    function getPathCoordinate(currentX, currentY, xGap, yGap, yFirst = true){
        let pathY, pathX;
        if(yFirst){
            if(yGap != 0){
                if(yGap > 0){
                    pathY = currentY + 1;
                }else{
                    pathY = currentY - 1;
                }
                pathX = currentX;
            }else{
                if(xGap > 0){
                    pathX = currentX + 1;
                }else{
                    pathX = currentX - 1;
                }
                pathY = currentY;
            }
        }else{
            if(xGap != 0){
                if(xGap > 0){
                    pathX = currentX + 1;
                }else{
                    pathX = currentX - 1;
                }
                pathY = currentY;
            }else{
                if(yGap > 0){
                    pathY = currentY + 1;
                }else{
                    pathY = currentY - 1;
                }
                pathX = currentX;
            }
        }

        return [pathX, pathY];
    }

    const ignore = [3, 4, 7, 8, 11, 12, 13, 14, 15];
    const allow = [1, 2, 5, 6]

    async function startAIMode(){
        for(let i = 1; i < 16; i++){
            if(!allow.includes(i)){
                continue;
            }
            let pos = valuePos(i);
            while(pos != i){
                const [currentX, currentY] = getCoordinate(pos);
                const [destinationX, destinationY] = getCoordinate(i);
                const yGap = destinationY - currentY;
                const xGap = destinationX - currentX;
                
                let [pathX, pathY] = getPathCoordinate(currentX, currentY, xGap, yGap);
                let pathPosition = getPosition(pathX, pathY);
                if(pathPosition < i){
                    [pathX, pathY] = getPathCoordinate(currentX, currentY, xGap, yGap, false);
                    pathPosition = getPosition(pathX, pathY);
                }

                const emptyPosition = valuePos();
                const [emptyCoordinateX, emptyCoordinateY] = getCoordinate(emptyPosition);
                let moveYFirst = true;

                if(emptyCoordinateX == currentX){
                    if(emptyCoordinateX == pathX){
                        const getNewPosition = getPosition(emptyCoordinateX + 1, emptyCoordinateY);
                        await switchPos(emptyPosition, getNewPosition)
                    }else{
                        moveYFirst = false;
                    }
                }else if(emptyCoordinateY == currentY){
                    if(emptyCoordinateY == pathY){
                        const getNewPosition = getPosition(emptyCoordinateX, emptyCoordinateY + 1);
                        switchPos(emptyPosition, getNewPosition)
                        moveYFirst = false;
                    }
                }

                await moveEmptyToPath(pathPosition, pathX, pathY, moveYFirst);
                await switchPos(pos, pathPosition);
                pos = valuePos(i);
            }
        }
    }

    //finding position of empty box and move it to the destination point coordinate given
    //yFirst = true, move the empty across the columns first, else move across row first
    async function moveEmptyToPath(destPos, pathX, pathY, yFirst = true){
        let pos = valuePos();
        while(pos != destPos){
            const [currentX, currentY] = getCoordinate(pos);
            const yGap = pathY - currentY;
            const xGap = pathX - currentX;
            let newY, newX;
            if(yFirst){
                if(yGap != 0){
                    if(yGap > 0){
                        newY = currentY + 1;
                    }else{
                        newY = currentY - 1;
                    }
                    newX = currentX;
                }else if(xGap != 0){
                    if(xGap > 0){
                        newX = currentX + 1;
                    }else{
                        newX = currentX - 1;
                    }
                    newY = currentY;
                }
            }else{
                if(xGap != 0){
                    if(xGap > 0){
                        newX = currentX + 1;
                    }else{
                        newX = currentX - 1;
                    }
                    newY = currentY;
                }else if(yGap != 0){
                    if(yGap > 0){
                        newY = currentY + 1;
                    }else{
                        newY = currentY - 1;
                    }
                    newX = currentX;
                }
            }

            

            const newPosition = getPosition(newX, newY);
            await switchPos(pos, newPosition);
            pos = valuePos();
        }
    }

    async function switchPos(pos1, pos2){
        const temp = boxes[pos1 - 1].textContent;
        boxes[pos1 - 1].textContent = boxes[pos2 - 1].textContent
        boxes[pos2 - 1].textContent = temp

        await sleep(2000)
    }
</script>
</html>
