<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #1e1e1e; color: #fff; }
</style>
</head>
<body>
<svg width="0" height="0" style={{ position: 'absolute' }}>
  <defs>
    <linearGradient id="fadeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="30%" stopColor="#ffffff" stopOpacity="0.15" />
      <stop offset="100%" stopColor="#ffffff" stopOpacity="0" />
    </linearGradient>
    <mask id="fadeMask">
      <rect width="100%" height="100%" fill="url(#fadeGradient)" />
    </mask>
  </defs>
</svg>

<svg width="160" height="160" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="mask: url(#fadeMask); -webkit-mask: url(#fadeMask); color: #fff;">
  <!-- Some overlapping paths -->
  <circle cx="12" cy="12" r="10"></circle>
  <path d="M2 12h20"></path>
  <path d="M12 2v20"></path>
</svg>
</body>
</html>
