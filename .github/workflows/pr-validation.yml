name: "PR Validation (Feature -> Dev)"

on:
  pull_request:
    branches: [ "development" ]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Verify Secrets Against .env.example
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          node -e '
          const fs = require("fs");
          const secrets = JSON.parse(process.env.SECRETS_JSON || "{}");
          const envExample = fs.readFileSync(".env.example", "utf-8");
          const missing = [];
          envExample.split("\n").forEach(line => {
            const trimmed = line.trim();
            if (trimmed && !trimmed.startsWith("#")) {
              const key = trimmed.split("=")[0];
              if (!secrets[key]) {
                missing.push(key);
              }
            }
          });
          if (missing.length > 0) {
            console.error(`::error::Missing required secrets in GitHub Actions: ${missing.join(", ")}`);
            process.exit(1);
          }
          '

      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_APPWRITE_ENDPOINT=${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID=${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DB_NAME=${{ secrets.VITE_APPWRITE_DB_NAME }}
          VITE_APPWRITE_COLLECTION_TEAMS=${{ secrets.VITE_APPWRITE_COLLECTION_TEAMS }}
          VITE_APPWRITE_COLLECTION_SESSIONS=${{ secrets.VITE_APPWRITE_COLLECTION_SESSIONS }}
          VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS=${{ secrets.VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS }}
          VITE_APPWRITE_COLLECTION_REPORTS=${{ secrets.VITE_APPWRITE_COLLECTION_REPORTS }}
          VITE_APPWRITE_COLLECTION_SETTINGS=${{ secrets.VITE_APPWRITE_COLLECTION_SETTINGS }}
          BUILD_SIGNING_KEY=${{ secrets.BUILD_SIGNING_KEY }}
          SEAL_PRIVATE_KEY=${{ secrets.SEAL_PRIVATE_KEY }}
          SEAL_PUBLIC_KEY=${{ secrets.SEAL_PUBLIC_KEY }}
          EOF
          echo ".env file created successfully"

      - name: Verify .env file
        run: |
          if [ ! -f .env ]; then
            echo "Error: .env file was not created"
            exit 1
          fi
          echo ".env file exists and contains $(wc -l < .env) lines"

      - name: Build macOS App
        if: matrix.os == 'macos-latest'
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows App
        if: matrix.os == 'windows-latest'
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Check Build Output (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          echo "Checking for build artifacts..."
          ls -la release/ || echo "Release directory not found"
          if [ -d "release" ]; then
            find release -type f -name "*.dmg" -o -name "*.zip" || echo "No DMG or ZIP files found"
          fi

      - name: Check Build Output (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "Checking for build artifacts..."
          ls -la release/ || echo "Release directory not found"
          if [ -d "release" ]; then
            find release -type f -name "*.exe" || echo "No EXE files found"
          fi

      - name: Upload macOS Artifacts
        if: matrix.os == 'macos-latest' && hashFiles('release/*.dmg') != '' || hashFiles('release/*.zip') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
          retention-days: 3
          if-no-files-found: warn

      - name: Upload Windows Artifacts
        if: matrix.os == 'windows-latest' && hashFiles('release/*.exe') != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: release/*.exe
          retention-days: 3
          if-no-files-found: warn
