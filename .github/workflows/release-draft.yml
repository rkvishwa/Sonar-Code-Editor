name: Build and Draft Release

on:
  push:
    branches:
      - releases

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    outputs:
      app_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version from package.json
        id: get_version
        shell: bash
        run: |
          # This reads the exact "version" string from package.json
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$PACKAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # We skip the "Set App Version dynamic" step because your package.json is already correct

      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_APPWRITE_ENDPOINT=${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID=${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DB_NAME=${{ secrets.VITE_APPWRITE_DB_NAME }}
          VITE_APPWRITE_COLLECTION_TEAMS=${{ secrets.VITE_APPWRITE_COLLECTION_TEAMS }}
          VITE_APPWRITE_COLLECTION_SESSIONS=${{ secrets.VITE_APPWRITE_COLLECTION_SESSIONS }}
          VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS=${{ secrets.VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS }}
          VITE_APPWRITE_COLLECTION_REPORTS=${{ secrets.VITE_APPWRITE_COLLECTION_REPORTS }}
          VITE_APPWRITE_COLLECTION_SETTINGS=${{ secrets.VITE_APPWRITE_COLLECTION_SETTINGS }}
          BUILD_SIGNING_KEY=${{ secrets.BUILD_SIGNING_KEY }}
          SEAL_PRIVATE_KEY=${{ secrets.SEAL_PRIVATE_KEY }}
          SEAL_PUBLIC_KEY=${{ secrets.SEAL_PUBLIC_KEY }}
          EOF

      - name: Build macOS app (DMG)
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_APPWRITE_ENDPOINT=${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID=${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DB_NAME=${{ secrets.VITE_APPWRITE_DB_NAME }}
          VITE_APPWRITE_COLLECTION_TEAMS=${{ secrets.VITE_APPWRITE_COLLECTION_TEAMS }}
          VITE_APPWRITE_COLLECTION_SESSIONS=${{ secrets.VITE_APPWRITE_COLLECTION_SESSIONS }}
          VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS=${{ secrets.VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS }}
          VITE_APPWRITE_COLLECTION_REPORTS=${{ secrets.VITE_APPWRITE_COLLECTION_REPORTS }}
          VITE_APPWRITE_COLLECTION_SETTINGS=${{ secrets.VITE_APPWRITE_COLLECTION_SETTINGS }}
          BUILD_SIGNING_KEY=${{ secrets.BUILD_SIGNING_KEY }}
          SEAL_PRIVATE_KEY=${{ secrets.SEAL_PRIVATE_KEY }}
          SEAL_PUBLIC_KEY=${{ secrets.SEAL_PUBLIC_KEY }}
          EOF

      - name: Build Windows app (MSIX/AppX)
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: release/*.exe

  create-release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          # This uses the exact version from your package.json
          name: Release ${{ needs.build-mac.outputs.app_version }}
          tag_name: "v${{ needs.build-mac.outputs.app_version }}"
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
