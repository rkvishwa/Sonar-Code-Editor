name: "Manual Build (Development)"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from (defaults to development)'
        required: false
        default: 'development'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (Development)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'development' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 20 seconds..."
            sleep 20
          done

      - name: Set App Version dynamic
        run: npm --no-git-tag-version version 1.0.0-beta-manual.${{ github.run_number }}

      - name: Create .env file
        shell: bash
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const secrets = JSON.parse(process.env.SECRETS_JSON || '{}');
          const envExample = fs.readFileSync('.env.example', 'utf8');
          const missing = [];
          const output = [];

          envExample.split(/\r?\n/).forEach((line) => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) {
              return;
            }

            const key = trimmed.split('=')[0].trim();
            if (!secrets[key]) {
              missing.push(key);
              return;
            }

            output.push(`${key}=${secrets[key]}`);
          });

          if (missing.length > 0) {
            console.error(`Missing required secrets in GitHub Actions: ${missing.join(', ')}`);
            process.exit(1);
          }

          fs.writeFileSync('.env', `${output.join('\n')}\n`);
          console.log(`.env file created successfully with ${output.length} entries`);
          NODE

      - name: Build macOS app (DMG)
        run: npm run build && npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_SKIP_SIGNING: true 

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App-DMG
          path: release/*.dmg
          retention-days: 7

  build-win:
    name: Build Windows (Development)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'development' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Cache Electron Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install Dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after $attempt attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 20 seconds..."
            sleep 20
          done

      - name: Set App Version dynamic
        run: npm --no-git-tag-version version 1.0.0-beta-manual.${{ github.run_number }}

      - name: Create .env file
        shell: bash
        env:
          SECRETS_JSON: ${{ toJson(secrets) }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const secrets = JSON.parse(process.env.SECRETS_JSON || '{}');
          const envExample = fs.readFileSync('.env.example', 'utf8');
          const missing = [];
          const output = [];

          envExample.split(/\r?\n/).forEach((line) => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('#')) {
              return;
            }

            const key = trimmed.split('=')[0].trim();
            if (!secrets[key]) {
              missing.push(key);
              return;
            }

            output.push(`${key}=${secrets[key]}`);
          });

          if (missing.length > 0) {
            console.error(`Missing required secrets in GitHub Actions: ${missing.join(', ')}`);
            process.exit(1);
          }

          fs.writeFileSync('.env', `${output.join('\n')}\n`);
          console.log(`.env file created successfully with ${output.length} entries`);
          NODE

      - name: Build Windows app (NSIS)
        run: npm run build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App-EXE
          path: release/*.exe
          retention-days: 7
