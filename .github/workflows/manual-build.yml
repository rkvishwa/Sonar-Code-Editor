name: "Manual Build (Development)"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from (defaults to development)'
        required: false
        default: 'development'

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (Development)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'development' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set App Version dynamic
        run: npm --no-git-tag-version version 1.0.0-beta-manual.${{ github.run_number }}

      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_APPWRITE_ENDPOINT=${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID=${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DB_NAME=${{ secrets.VITE_APPWRITE_DB_NAME }}
          VITE_APPWRITE_COLLECTION_TEAMS=${{ secrets.VITE_APPWRITE_COLLECTION_TEAMS }}
          VITE_APPWRITE_COLLECTION_SESSIONS=${{ secrets.VITE_APPWRITE_COLLECTION_SESSIONS }}
          VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS=${{ secrets.VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS }}
          VITE_APPWRITE_COLLECTION_REPORTS=${{ secrets.VITE_APPWRITE_COLLECTION_REPORTS }}
          VITE_APPWRITE_COLLECTION_SETTINGS=${{ secrets.VITE_APPWRITE_COLLECTION_SETTINGS }}
          BUILD_SIGNING_KEY=${{ secrets.BUILD_SIGNING_KEY }}
          SEAL_PRIVATE_KEY=${{ secrets.SEAL_PRIVATE_KEY }}
          SEAL_PUBLIC_KEY=${{ secrets.SEAL_PUBLIC_KEY }}
          EOF
          echo ".env file created successfully"

      - name: Build macOS app (DMG)
        run: npm run build && npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_SKIP_SIGNING: true 

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App-DMG
          path: release/*.dmg
          retention-days: 7

  build-win:
    name: Build Windows (Development)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'development' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Set App Version dynamic
        run: npm --no-git-tag-version version 1.0.0-beta-manual.${{ github.run_number }}

      - name: Create .env file
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_APPWRITE_ENDPOINT=${{ secrets.VITE_APPWRITE_ENDPOINT }}
          VITE_APPWRITE_PROJECT_ID=${{ secrets.VITE_APPWRITE_PROJECT_ID }}
          VITE_APPWRITE_DB_NAME=${{ secrets.VITE_APPWRITE_DB_NAME }}
          VITE_APPWRITE_COLLECTION_TEAMS=${{ secrets.VITE_APPWRITE_COLLECTION_TEAMS }}
          VITE_APPWRITE_COLLECTION_SESSIONS=${{ secrets.VITE_APPWRITE_COLLECTION_SESSIONS }}
          VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS=${{ secrets.VITE_APPWRITE_COLLECTION_ACTIVITY_LOGS }}
          VITE_APPWRITE_COLLECTION_REPORTS=${{ secrets.VITE_APPWRITE_COLLECTION_REPORTS }}
          VITE_APPWRITE_COLLECTION_SETTINGS=${{ secrets.VITE_APPWRITE_COLLECTION_SETTINGS }}
          BUILD_SIGNING_KEY=${{ secrets.BUILD_SIGNING_KEY }}
          SEAL_PRIVATE_KEY=${{ secrets.SEAL_PRIVATE_KEY }}
          SEAL_PUBLIC_KEY=${{ secrets.SEAL_PUBLIC_KEY }}
          EOF
          echo ".env file created successfully"

      - name: Build Windows app (MSIX/AppX)
        run: npm run build && npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_SKIP_SIGNING: true

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-App-MSIX
          path: release/*.appx
          retention-days: 7
